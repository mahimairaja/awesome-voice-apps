name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: ruff + checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: ruff format
        run: uvx ruff format --check .

      - name: ruff check
        run: uvx ruff check .

      - name: catalog unit test
        run: python3 scripts/test_build_catalog.py
