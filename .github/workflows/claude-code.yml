name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # claude-code-action mints an OIDC token to auth the Claude GitHub App

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Only repo owners, org members, or collaborators can trigger a build.
    # Anyone can open or comment on an issue, but @claude fires only for trusted
    # authors, so a stray @claude from an outside account is ignored.
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'issues' &&
        contains(github.event.issue.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: anthropics/claude-code-action@537ffff2eff706bd7e3e1c3daf2d4b39067a9f85  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Author commits as the repo owner, not claude[bot]. git-config.ts sets
          # the git identity to bot_name / <bot_id>+<bot_name>@users.noreply, and
          # that noreply form links the commit to the owner's GitHub account.
          bot_name: mahimairaja
          bot_id: "81288263"
          # Strip the co-author trailer and the "Generated with Claude Code"
          # footer from commits and PRs. attribution is the current key; the
          # legacy includeCoAuthoredBy covers older bundled CLI versions.
          settings: '{"attribution":{"commit":"","pr":""},"includeCoAuthoredBy":false}'
          claude_args: >-
            --model claude-sonnet-4-6
            --mcp-config .claude/mcp.json
            --allowed-tools Read,Glob,Grep,Bash,Write,Edit,mcp__livekit-docs__docs_search,mcp__livekit-docs__code_search,mcp__livekit-docs__get_pages,mcp__livekit-docs__get_python_agent_example,mcp__livekit-docs__get_sdks
