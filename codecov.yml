coverage:
  precision: 2
  round: down
  range: "60...100"
  status:
    project:
      default:
        # A cookbook: coverage is a signal, not a gate. Never fail CI on it.
        informational: true
    patch:
      default:
        informational: true

# One flag per demo. The eval job uploads coverage of demos/<slug> under the
# matching flag; keep this list in sync with the matrix in test.yml.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: clinic-scheduler
      paths:
        - demos/clinic-scheduler
    - name: drive-thru-coffee
      paths:
        - demos/drive-thru-coffee
    - name: quick-trivia
      paths:
        - demos/quick-trivia
    - name: water-tracker
      paths:
        - demos/water-tracker
    - name: roadside-dispatch
      paths:
        - demos/roadside-dispatch
    - name: tenant-rights
      paths:
        - demos/tenant-rights

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
